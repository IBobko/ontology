name: Sync ontology notes to WordPress

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Parse documents without publishing
        required: false
        default: true
        type: boolean
      path:
        description: Optional repository-relative Markdown file
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: sync-ontology-to-wordpress
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sync dependencies
        run: python -m pip install markdown PyYAML requests

      - name: Sync documents
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run }}
          DOCUMENT_PATH: ${{ inputs.path }}
        run: |
          args=(--repo-root "$GITHUB_WORKSPACE")
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ -n "$DOCUMENT_PATH" ]]; then
            args+=(--path "$DOCUMENT_PATH")
          fi
          python tools/wp/sync_drafts_to_wp.py "${args[@]}"
